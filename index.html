<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="desktop/imgs/icon.jpg" type="image/x-icon">
    <title>Redirecting based on device...</title>
	
<style>
	body {
		background-color: #253030;
		color: #9FA07F;
	}
	
	@import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');
	
	h1 {
		font-family: "Russo One", sans-serif;
	}
	
	h2 {
		font-family: "Russo One", sans-serif;
	}
	
	a {
		color: aqua;
	}
	
	a:hover {
		color: #A81272;
	 	-webkit-transition: all 0.5s ease;
		transition: all 0.5s ease;
	}
</style>

    <script>
        function redirectBasedOnDevice() {
            if (window.innerWidth <= 800) {
                window.location.href = "mobile/";
            } else {
                window.location.href = "desktop/";
            }
        }
        window.onload = redirectBasedOnDevice;
    </script>
</head>
<body>
    <h1>Redirecting based on device...</h1><br></br>
	<h2>If you are not redirected, <a href="mobile/">click here</a>. (Mobile)</h2>
	<h2>If you are not redirected, <a href="desktop/">click here</a>. (Desktop)</h2>
</body>
</html>
