    <style>
        /* Base Styles (copied from your original to keep the context) */
        body, html {
            height: 100%;
            margin: 0;
            font: 400 15px/1.8 "Lato", sans-serif;
            color: #777;
        }

        /* Portfolio Grid and Lightbox Styles - WITH FORCEFUL OVERRIDES */
        /* ----------------------------------------------------------- */

        /* FIX 1: Ensure the outer container is centered and large enough to hold the grid */
        .nk-gallery-wrapper {
            /* Force the wrapper to take up space below the fixed menu */
            padding: 90px 20px 20px 20px !important; 
            max-width: 1300px !important; /* Slightly wider max-width for more columns */
            width: 100% !important;
            margin: 0 auto !important; 
            background-color: transparent !important; /* Remove the semi-transparent black background */
        }

        /* FIX 2: Portfolio Grid Layout - Force width and multi-column display */
        .nk-gallery-grid {
            /* IMPORTANT: Use !important to defeat external file width constraints */
            width: 100% !important; 
            box-sizing: border-box !important;

            display: grid !important;
            /* Auto-fit columns: Ensure multiple columns appear */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)) !important; /* slightly smaller min size to fit more columns */
            gap: 20px !important; /* Increased gap for visual separation */
            padding: 0 !important;
            margin: 0 !important;
        }

        /* FIX 3: Reset styling for the title wrapper to match the new layout */
        .nk-content-header {
            width: 100%;
            padding: 0 20px;
            margin-bottom: 30px; /* Space between title and grid */
        }
        
        .name {
            /* Override external margin and color to fit the current design */
            margin: 0 !important;
            color: #9FA07F !important;
        }
        
        /* Portfolio Item Container: Provides aspect ratio and hover effects */
        .nk-gallery-item {
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);  /* Deeper shadow for contrast */
            border-radius: 5px;
            padding-bottom: 75%; 
            background-color: #253030;  /* Use body/footer background for consistency */
            cursor: pointer;
        }

        /* Image Styling: Ensures images fill the container */
        .nk-gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.3s ease-in-out;
        }

        .nk-gallery-item:hover img {
            transform: scale(1.05); 
        }

        /* Caption Styling */
        .nk-gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7); 
            color: #ccc; /* Slightly lighter text color */
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .nk-gallery-item:hover .nk-gallery-caption {
            opacity: 1;
        }
        
        /* Lightbox Styles */
        #nk-lightbox {
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #nk-lightbox.active {
            display: flex;
        }

        #nk-lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            object-fit: contain; 
        }
    </style>

    <script>
        function setupLightbox() {
            // Select only the images that are inside the new grid
            const portfolioImages = document.querySelectorAll('.nk-gallery-grid .nk-gallery-item img');
            
            // Create the main lightbox element once (using new ID)
            const lightbox = document.createElement('div');
            lightbox.id = 'nk-lightbox';
            document.body.appendChild(lightbox);

            // Add click listener to each image
            portfolioImages.forEach(image => {
                image.addEventListener('click', e => {
                    e.preventDefault(); 
                    e.stopPropagation();

                    lightbox.classList.add('active'); 

                    lightbox.innerHTML = ''; 

                    // Create a copy of the clicked image for the lightbox view
                    const clickedImage = document.createElement('img');
                    clickedImage.src = image.src;
                    clickedImage.alt = image.alt;
                    
                    lightbox.appendChild(clickedImage);
                });
            });

            // Close the lightbox when the dark background is clicked (using new ID)
            lightbox.addEventListener('click', e => {
                if (e.target.id === 'nk-lightbox') {
                    lightbox.classList.remove('active'); 
                }
            });
            
            // Optional: Close lightbox with the ESC key
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape" && lightbox.classList.contains('active')) {
                    lightbox.classList.remove('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', setupLightbox);
    </script>
