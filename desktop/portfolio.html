    <style>
        /* Portfolio Grid Layout: Replacing your existing 'row' class for better responsiveness */
        .portfolio-grid {
            display: grid;
            /* Auto-fit columns, min size 300px, but you can adjust this number */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            margin: 0 auto;
        }

        /* Portfolio Item Container */
        .portfolio-item {
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); /* Slightly darker shadow for visibility on dark background */
            border-radius: 5px;
            /* Placeholder sizing to prevent layout shift (CLS) */
            padding-bottom: 75%; /* Assuming a 4:3 aspect ratio (adjust this if your photos are 1:1 or 16:9) */
            background-color: #444; /* Darker placeholder color */
            cursor: pointer; /* Indicate clickability for lightbox */
        }

        /* Image Styling */
        .portfolio-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures images cover the area without distortion */
            display: block;
            transition: transform 0.3s ease-in-out;
        }

        .portfolio-item:hover img {
            transform: scale(1.05); /* Subtle zoom effect */
        }

        /* Lightbox Styles (Needed for script) */
        #lightbox {
            position: fixed;
            z-index: 2000; /* Ensure it's on top of everything, including the menu */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            object-fit: contain; /* Use 'contain' in lightbox to see the full image */
        }
        
        /* Optional: Caption/Title below the image */
        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7); 
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .portfolio-item:hover .caption {
            opacity: 1;
        }
    </style>

    <script>
        // Function to create and manage the lightbox
        function setupLightbox() {
            // Select only the images that are inside the portfolio grid
            const portfolioImages = document.querySelectorAll('.portfolio-grid .portfolio-item img');
            
            // Create the main lightbox element once and append it to the body
            const lightbox = document.createElement('div');
            lightbox.id = 'lightbox';
            document.body.appendChild(lightbox);

            // Add click listener to each image
            portfolioImages.forEach(image => {
                image.addEventListener('click', e => {
                    // Stop the default action and prevent propagation
                    e.preventDefault(); 
                    e.stopPropagation();

                    lightbox.classList.add('active'); // Show the lightbox

                    // Clear previous content
                    lightbox.innerHTML = ''; 

                    // Create a copy of the clicked image
                    const clickedImage = document.createElement('img');
                    clickedImage.src = image.src;
                    clickedImage.alt = image.alt;
                    
                    // Append the image to the lightbox
                    lightbox.appendChild(clickedImage);
                });
            });

            // Close the lightbox when the background is clicked
            lightbox.addEventListener('click', e => {
                // Only close if the click target is the dark lightbox itself, not the image inside it
                if (e.target.id === 'lightbox') {
                    lightbox.classList.remove('active'); // Hide the lightbox
                }
            });
            
            // Optional: Close lightbox with the ESC key
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape" && lightbox.classList.contains('active')) {
                    lightbox.classList.remove('active');
                }
            });
        }

        // Run the function when the page loads
        document.addEventListener('DOMContentLoaded', setupLightbox);
    </script>
