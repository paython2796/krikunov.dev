<style>
        /* Base Styles (from your original code) */
        body, html {
            height: 100%;
            margin: 0;
            font: 400 15px/1.8 "Lato", sans-serif;
            color: #777;
        }

        /* FIX 1: Ensure the outer container allows full width and centering */
        /* This div wraps your gallery content */
        .gallery-container {
            padding: 20px; 
            max-width: 1200px; /* Limits max width on huge screens, adjust or remove if needed */
            margin: 0 auto; 
            background-color: rgba(0, 0, 0, 0.5);
        }

        /* FIX 2: Portfolio Grid Layout - The core fix for width and columns */
        .portfolio-grid {
            /* IMPORTANT: Use !important to override external file constraints */
            width: 100% !important; 
            box-sizing: border-box !important;

            display: grid;
            /* Auto-fit columns: This line ensures multiple columns appear */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)) !important; 
            gap: 20px;
            padding: 0; /* Removed padding here to prevent double padding with container */
            margin: 0;
        }

        /* Portfolio Item Container: Provides aspect ratio and hover effects */
        .portfolio-item {
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); 
            border-radius: 5px;
            /* Placeholder sizing to prevent layout shift (CLS). */
            padding-bottom: 75%; 
            background-color: #444; 
            cursor: pointer;
        }

        /* Image Styling: Ensures images fill the container */
        .portfolio-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.3s ease-in-out;
        }

        .portfolio-item:hover img {
            transform: scale(1.05); 
        }

        /* Caption Styling */
        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7); 
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .portfolio-item:hover .caption {
            opacity: 1;
        }
        
        /* Lightbox Styles: Full-screen popup for viewing the image */
        #lightbox {
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            object-fit: contain; 
        }
    </style>
